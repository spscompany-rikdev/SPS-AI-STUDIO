<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPS AI Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1120;
color:white;
min-height:100vh;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:#2563eb;
filter:blur(180px);
top:-150px;
left:-100px;
opacity:.3;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:500px;
height:500px;
background:#7c3aed;
filter:blur(180px);
bottom:-150px;
right:-100px;
opacity:.3;
z-index:-1;
}

.header{
width:100%;
padding:20px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(17,24,39,.65);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:28px;
font-weight:700;
background:linear-gradient(90deg,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header-buttons{
display:flex;
gap:10px;
}

.top-btn{
padding:10px 16px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
background:#1f2937;
color:white;
}

.delete-btn{
background:#dc2626;
}

.main{
padding:35px 20px;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:100%;
max-width:450px;
background:rgba(17,24,39,.85);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:35px;
box-shadow:0 0 50px rgba(0,0,0,.35);
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
color:#9ca3af;
margin-bottom:28px;
line-height:1.6;
}

input,
textarea{
width:100%;
padding:16px;
background:#1f2937;
border:none;
border-radius:16px;
color:white;
font-size:15px;
outline:none;
margin-top:15px;
}

textarea{
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

.hidden{
display:none;
}

.status{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#1e293b;
font-size:14px;
}

.dashboard{
width:100%;
max-width:1200px;
}

.top-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:25px;
}

.stat-card{
background:rgba(17,24,39,.85);
backdrop-filter:blur(15px);
padding:25px;
border-radius:22px;
border:1px solid rgba(255,255,255,.08);
}

.stat-title{
font-size:14px;
color:#9ca3af;
margin-bottom:10px;
}

.stat-value{
font-size:30px;
font-weight:700;
}

.api-box{
background:rgba(17,24,39,.85);
padding:25px;
border-radius:22px;
border:1px solid rgba(255,255,255,.08);
margin-bottom:25px;
}

.chat-container{
height:75vh;
background:rgba(17,24,39,.85);
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
display:flex;
flex-direction:column;
overflow:hidden;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:25px;
scroll-behavior:smooth;
}

.message{
display:flex;
margin-bottom:20px;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:none;
}
}

.user{
justify-content:flex-end;
}

.ai{
justify-content:flex-start;
}

.bubble{
max-width:80%;
padding:16px 18px;
border-radius:18px;
line-height:1.7;
white-space:pre-wrap;
word-wrap:break-word;
}

.user .bubble{
background:#2563eb;
}

.ai .bubble{
background:#1f2937;
}

.chat-input{
padding:20px;
display:flex;
gap:15px;
border-top:1px solid rgba(255,255,255,.08);
}

.chat-input textarea{
height:60px;
margin:0;
}

.send-btn{
width:120px;
margin:0;
}

.copy-btn{
background:#1f2937;
}

.typing{
display:flex;
gap:5px;
align-items:center;
}

.dot{
width:8px;
height:8px;
background:#60a5fa;
border-radius:50%;
animation:bounce 1s infinite;
}

.dot:nth-child(2){
animation-delay:.2s;
}

.dot:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{
0%,80%,100%{
transform:translateY(0);
opacity:.5;
}
40%{
transform:translateY(-8px);
opacity:1;
}
}

.warning{
color:#f59e0b;
margin-top:10px;
font-size:14px;
}

@media(max-width:768px){

.chat-input{
flex-direction:column;
}

.send-btn{
width:100%;
}

.header{
padding:18px;
}

.logo{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="header">

<div class="logo">SPS AI STUDIO</div>

<div class="header-buttons hidden" id="headerButtons">

<button class="top-btn" onclick="signOut()">
Sign Out
</button>

<button class="top-btn delete-btn" onclick="deleteAccount()">
Delete Account
</button>

</div>

</div>

<!-- SIGNUP -->

<div class="main" id="signupPage">

<div class="card">

<h1>Create Account</h1>

<div class="subtitle">
Create your SPS AI account and receive your personal API key.
</div>

<input
type="email"
id="signupEmail"
placeholder="Enter your email"
/>

<button onclick="signup()">
Send OTP
</button>

<div class="status hidden" id="signupStatus"></div>

</div>

</div>

<!-- VERIFY -->

<div class="main hidden" id="verifyPage">

<div class="card">

<h1>Verify OTP</h1>

<div class="subtitle">
We sent a 6 digit code to your email.
</div>

<input
type="text"
id="otpInput"
placeholder="Enter OTP"
/>

<button onclick="verifyOTP()">
Verify Account
</button>

<div class="status hidden" id="verifyStatus"></div>

</div>

</div>

<!-- DASHBOARD -->

<div class="main hidden" id="dashboardPage">

<div class="dashboard">

<div class="top-grid">

<div class="stat-card">
<div class="stat-title">Daily Limit</div>
<div class="stat-value">8</div>
</div>

<div class="stat-card">
<div class="stat-title">Remaining Today</div>
<div class="stat-value" id="remainingCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Status</div>
<div class="stat-value">Active</div>
</div>

</div>

<div class="api-box">

<h2>Your API Key</h2>

<textarea id="apiKeyBox" readonly></textarea>

<button class="copy-btn" onclick="copyAPIKey()">
Copy API Key
</button>

<div class="warning">
Do not share your API key publicly.
</div>

</div>

<div class="chat-container">

<div class="chat-box" id="chatBox"></div>

<div class="chat-input">

<textarea
id="messageInput"
placeholder="Ask SPS AI anything..."
></textarea>

<button class="send-btn" onclick="sendMessage()">
Send
</button>

</div>

</div>

</div>

</div>

<script>

const API = "https://juice-emporium-frozen.ngrok-free.dev";
//=====================================
// Example=https://juice-emporium-frozen.ngrok-free.dev
//=====================================
// ======================================
// PAGE
// ======================================

function showPage(id){

[
"signupPage",
"verifyPage",
"dashboardPage"
].forEach(page=>{

document.getElementById(page)
.classList.add("hidden");

});

document.getElementById(id)
.classList.remove("hidden");

}


// ======================================
// SIGNUP
// ======================================

async function signup(){

const email =
document.getElementById("signupEmail")
.value.trim();

const status =
document.getElementById("signupStatus");

status.classList.remove("hidden");
status.innerHTML = "Sending OTP...";

try{

const r = await fetch(API + "/signup",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
});

const data = await r.json();

if(data.success){

localStorage.setItem("email",email);

status.innerHTML = "OTP sent successfully.";

setTimeout(()=>{
showPage("verifyPage");
},1000);

}else{

status.innerHTML = data.message;

}

}catch(err){

status.innerHTML = "Server connection failed.";

}

}


// ======================================
// VERIFY
// ======================================

async function verifyOTP(){

const email =
localStorage.getItem("email");

const otp =
document.getElementById("otpInput")
.value.trim();

const status =
document.getElementById("verifyStatus");

status.classList.remove("hidden");

status.innerHTML = "Verifying...";

try{

const r = await fetch(API + "/verify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
otp
})
});

const data = await r.json();

if(data.success){

localStorage.setItem(
"api_key",
data.api_key
);

status.innerHTML =
"Verification successful.";

showPage("dashboardPage");

document
.getElementById("headerButtons")
.classList.remove("hidden");

loadDashboard();

}else{

status.innerHTML = data.message;

}

}catch(err){

status.innerHTML = "Verification failed.";

}

}


// ======================================
// DASHBOARD
// ======================================

async function loadDashboard(){

const api_key =
localStorage.getItem("api_key");

if(!api_key) return;

try{

const r = await fetch(API + "/apikey",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({api_key})
});

const data = await r.json();

if(data.success){

document.getElementById(
"apiKeyBox"
).value = api_key;

document.getElementById(
"remainingCount"
).innerHTML = data.remaining;

}

}catch(err){

console.log(err);

}

}


// ======================================
// COPY
// ======================================

function copyAPIKey(){

navigator.clipboard.writeText(
document.getElementById(
"apiKeyBox"
).value
);

alert("API Key Copied");

}


// ======================================
// CHAT
// ======================================

async function sendMessage(){

const input =
document.getElementById("messageInput");

const message =
input.value.trim();

if(!message) return;

const api_key =
localStorage.getItem("api_key");

addMessage(message,"user");

input.value = "";

showTyping();

try{

const r = await fetch(API + "/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
api_key,
message
})
});

const data = await r.json();

removeTyping();

if(data.success){

const text =
data.response.content || "No response";

addMessage(text,"ai");

document.getElementById(
"remainingCount"
).innerHTML = data.remaining;

}else{

addMessage(data.message,"ai");

}

}catch(err){

removeTyping();

addMessage(
"Server error.",
"ai"
);

}

}


// ======================================
// CHAT UI
// ======================================

function addMessage(text,type){

const chatBox =
document.getElementById("chatBox");

const div =
document.createElement("div");

div.className = "message " + type;

const bubble =
document.createElement("div");

bubble.className = "bubble";

bubble.innerText = text;

div.appendChild(bubble);

chatBox.appendChild(div);

chatBox.scrollTop =
chatBox.scrollHeight;

}


function showTyping(){

const chatBox =
document.getElementById("chatBox");

const div =
document.createElement("div");

div.className = "message ai";

div.id = "typing";

const bubble =
document.createElement("div");

bubble.className = "bubble";

bubble.innerHTML = `
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
`;

div.appendChild(bubble);

chatBox.appendChild(div);

chatBox.scrollTop =
chatBox.scrollHeight;

}


function removeTyping(){

const typing =
document.getElementById("typing");

if(typing) typing.remove();

}


// ======================================
// ENTER SEND
// ======================================

document.addEventListener(
"keydown",
function(e){

if(
e.key === "Enter" &&
!e.shiftKey &&
document.activeElement.id === "messageInput"
){

e.preventDefault();

sendMessage();

}

}
);


// ======================================
// SIGN OUT
// ======================================

function signOut(){

localStorage.removeItem("api_key");

location.reload();

}


// ======================================
// DELETE ACCOUNT
// ======================================

async function deleteAccount(){

const confirmDelete = confirm(
"Delete account permanently?"
);

if(!confirmDelete) return;

const api_key =
localStorage.getItem("api_key");

try{

const r = await fetch(
API + "/delete-account",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
api_key
})
}
);

const data = await r.json();

alert(data.message);

localStorage.clear();

location.reload();

}catch(err){

alert("Delete failed");

}

}


// ======================================
// AUTO LOGIN
// ======================================

window.onload = ()=>{

const api_key =
localStorage.getItem("api_key");

if(api_key){

showPage("dashboardPage");

document
.getElementById("headerButtons")
.classList.remove("hidden");

loadDashboard();

}

};

</script>

</body>
</html>
